[phases.setup]
nixPkgs = ["python313", "ffmpeg"]

[phases.install]
cmds = [
  "pip install --upgrade pip -q",
  "pip install -r requirements.txt -q",
  "pip install -U yt-dlp -q"
]

[phases.build]
cmds = [
  "mkdir -p /tmp/vidpost_clips /tmp/vidpost_uploads",
  "chmod +x start.sh"
]

[start]
cmd = "bash start.sh"
